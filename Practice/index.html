<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body{
            height: 100%;
            width: 100%;
            /* background-color: black; */
        }
        .container{
            display: grid;
            width: 100%;
            grid-template-rows: repeat(3, 100px);
            grid-template-columns: repeat(3, 100px);
            gap: 2rem 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box items1">1</div>
        <div class="box items2">2</div>
        <div class="box items3">
            <span>Hello world</span>
        </div>
        <div class="box items4">3</div>
        <div class="box items5">4</div>
    </div>
</body>
</html>
